services:
  evalupro-db:
    image: mongo:6-jammy
    container_name: evalupro_db
    restart: unless-stopped
    volumes:
      - evalupro_mongo_data:/data/db

  evalupro-app:
    image: gabrielmaltais/evalupro:latest
    container_name: evalupro_app
    restart: unless-stopped
    ports:
      - "80:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://evalupro-db:27017/evalupro
      - JWT_SECRET=change_this_to_a_secure_random_string_in_production
      # Première installation : admin créé uniquement si la base est vide (voir README)
      - ADMIN_INITIAL_EMAIL=admin
      - ADMIN_INITIAL_PASSWORD=ChangeThisPasswordImmediately1
    depends_on:
      - evalupro-db

volumes:
  evalupro_mongo_data:
