# Build and push Docker image to Docker Hub on push to main.
# Set repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in GitHub.

name: Docker build and push

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE: gabrielmaltais/evalupro

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.IMAGE }}:latest

      - name: Start Mongo + app and hit /health
        run: |
          set -eux
          docker network create evalupro-smoke-net
          docker run -d --name evalupro-smoke-mongo --network evalupro-smoke-net mongo:6-jammy
          for i in $(seq 1 45); do
            if docker exec evalupro-smoke-mongo mongosh --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q '^1$'; then
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "Mongo did not become ready in time"
              exit 1
            fi
            sleep 1
          done
          docker run -d --name evalupro-smoke-app --network evalupro-smoke-net -p 4000:4000 \
            -e PORT=4000 \
            -e MONGODB_URI=mongodb://evalupro-smoke-mongo:27017/evalupro \
            -e JWT_SECRET=smoke-ci \
            ${{ env.IMAGE }}:latest
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4000/health | tee /tmp/health.json | grep -q '"ok"'; then
              echo "Smoke test OK"
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          echo "--- app logs ---"
          docker logs evalupro-smoke-app
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker rm -f evalupro-smoke-app 2>/dev/null || true
          docker rm -f evalupro-smoke-mongo 2>/dev/null || true
          docker network rm evalupro-smoke-net 2>/dev/null || true
